<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | VietnamWorks Clone</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="/css/reset_password.css">
</head>

<body>

<nav class="navbar navbar-vietnamworks">
    <div class="container">
        <a class="brand-logo" href="#">vietnam<span>works</span></a>

        <div class="d-flex align-items-center">
            <span class="text-muted me-3 d-none d-sm-inline">
                Bạn chưa có tài khoản?
            </span>
            <a href="#" class="btn btn-outline-primary btn-sm fw-bold">
                Đăng ký
            </a>
        </div>
    </div>
</nav>


<main class="container my-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card card-custom p-4 bg-white">

                <h4 class="text-center fw-bold mb-4" style="color:#1a2d42;">
                    Đặt lại mật khẩu
                </h4>


                <form id="resetPasswordForm">


                    <div class="mb-3">

                        <label for="token" class="form-label fw-semibold">
                            Mã xác thực (Token)
                        </label>

                        <input type="text"
                               id="token"
                               name="token"
                               class="form-control"
                               placeholder="Nhập mã token từ email">

                    </div>


                    <div class="mb-3">

                        <label for="oldPassword" class="form-label fw-semibold">
                            Mật khẩu cũ
                        </label>

                        <div class="input-group">

                            <input type="password"
                                   id="oldPassword"
                                   name="oldPassword"
                                   class="form-control"
                                   placeholder="Nhập mật khẩu cũ">


                            <span class="input-group-text password-toggle"
                                  onclick="togglePassword('oldPassword', this)">

                                <i class="bi bi-eye-slash"></i>

                            </span>

                        </div>

                    </div>


                    <div class="mb-3">

                        <label for="newPassword" class="form-label fw-semibold">
                            Mật khẩu mới
                        </label>


                        <div class="input-group">

                            <input type="password"
                                   id="newPassword"
                                   name="newPassword"
                                   class="form-control"
                                   placeholder="Nhập mật khẩu mới">


                            <span class="input-group-text password-toggle"
                                  onclick="togglePassword('newPassword', this)">

                                <i class="bi bi-eye-slash"></i>

                            </span>

                        </div>

                    </div>


                    <div class="mb-4">

                        <label for="confirmNewPassword" class="form-label fw-semibold">
                            Xác nhận mật khẩu mới
                        </label>


                        <div class="input-group">

                            <input type="password"
                                   id="confirmNewPassword"
                                   name="confirmNewPassword"
                                   class="form-control"
                                   placeholder="Xác nhận mật khẩu mới">


                            <span class="input-group-text password-toggle"
                                  onclick="togglePassword('confirmNewPassword', this)">

                                <i class="bi bi-eye-slash"></i>

                            </span>

                        </div>

                    </div>


                    <div class="d-grid gap-2">

                        <button type="submit"
                                class="btn btn-vietnamworks py-2">

                            Cập nhật mật khẩu

                        </button>

                    </div>


                </form>


            </div>

        </div>

    </div>

</main>


<footer class="footer-vietnamworks">

    <div class="container">

        <div class="row align-items-center">

            <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">

                <span class="fw-bold text-white fs-5">
                    vietnamworks
                </span>

                <p class="mb-0 mt-2 text-secondary" style="font-size:12px;">
                    © 2026 Công Ty Cổ Phần Navigos Group Việt Nam.
                    Trực thuộc Tập đoàn Navigos Group.
                </p>

            </div>


            <div class="col-md-6 text-center text-md-end">

                <a href="#" class="me-3">
                    Về VietnamWorks
                </a>

                <a href="#" class="me-3">
                    Điều khoản sử dụng
                </a>

                <a href="#">
                    Chính sách bảo mật
                </a>

            </div>


        </div>

    </div>

</footer>


<script th:src="@{/js/reset-password.js}"></script>


</body>
</html>
