<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/chat.css">


</head>
<body>
<div id="realtimeToastContainer"></div>

<nav class="top-navbar d-flex align-items-center px-3 bg-primary text-white">
    <div style="flex: 1;"></div>

    <div class="navbar-brand-custom d-flex align-items-center justify-content-center" style="flex: 2;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Logo_TopCV_no_slogan.png" alt="Logo" class="me-2" style="height: 35px; width: auto; border-radius: 4px;">
        <h5 class="mb-0 fw-bold text-nowrap">HỆ THỐNG CHAT TOPCV.VN</h5>
    </div>

    <div class="navbar-actions d-flex justify-content-end" style="flex: 1;">
        <a href="/" class="btn btn-light btn-sm rounded-pill shadow-sm">
            <i class="fas fa-home me-1"></i> Trang chủ
        </a>
    </div>
</nav>
<div class="chat-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-2">
                <!-- Avatar -->
                <div id="sidebarUserAvatar" class="sidebar-user-avatar"></div>

                <div>
                    <h5 class="mb-0">Tin nhắn </h5>
                    <small id="userFullName"></small>
                </div>
            </div>

            <div>
                <button class="btn btn-link text-white p-0" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>


        <div class="search-container">
            <div class="position-relative">
                <input type="text" class="form-control search-input" id="userSearch"
                       placeholder="Tìm kiếm Tên Công ty/ Nhà tuyển dụng...">
                <div class="user-search-results" id="userSearchResults"></div>
            </div>
        </div>

        <div class="conversations-list" id="conversationsList">
            <!-- Conversations will be loaded here -->
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="chat-user-info">
                <div class="avatar" id="chatUserAvatar"></div>
                <div class="ms-3">
                    <h6 class="mb-0" id="chatUserName"></h6>
                    <small class="text-muted" id="chatUserStatus">Offline</small>
                </div>
            </div>
            <div>
                <button class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-phone"></i>
                </button>


                <!-- Audio tag để nghe âm thanh từ người kia -->


                <button class="btn btn-outline-secondary btn-sm ms-2">
                    <i class="fas fa-video"></i>
                </button>
            </div>

        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-chat" id="emptyChat">
                <i class="fas fa-comments"></i>
                <h5>Chọn một cuộc trò chuyện để bắt đầu</h5>
                <p>Tìm kiếm và chọn người dùng để bắt đầu nhắn tin</p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <i class="fas fa-ellipsis-h"></i> Đang nhập...
        </div>

        <div class="message-input-container" id="messageInputContainer" style="display: none;">

            <div class="file-preview-container" id="filePreviewContainer" style="display: none;">
                <div class="file-preview" id="filePreview">
                    <!-- File preview will be shown here -->
                </div>
                <div class="file-actions">
                    <button type="button" class="btn btn-primary btn-sm" id="sendFileBtn">
                        <i class="fas fa-paper-plane"></i> Gửi
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" id="cancelFileBtn">
                        <i class="fas fa-times"></i> Hủy
                    </button>
                </div>
            </div>
            <form id="messageForm">
                <div class="message-input-group position-relative">
                    <!-- Attach file button (THÊM MỚI) -->
                    <button type="button" class="attach-btn" id="attachBtn">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <!-- Hidden file input -->
                    <input type="file" id="fileInput" accept="image/*,.pdf" style="display: none;">

                    <!-- Emoji button -->
                    <button type="button" class="emoji-btn" id="emojiBtn">😀</button>

                    <input type="text" class="message-input" id="messageInput"
                           placeholder="Nhập tin nhắn..." required>

                    <!-- Send -->
                    <button type="submit" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>

                    <!-- Emoji picker -->
                    <div class="emoji-picker" id="emojiPicker">

                        <!-- Tabs -->
                        <div class="emoji-tabs">
                            <button type="button" class="emoji-tab active" data-tab="smileys">😄</button>
                            <button type="button" class="emoji-tab" data-tab="hearts">❤️</button>
                            <button type="button" class="emoji-tab" data-tab="symbols">🔥</button>
                        </div>

                        <!-- Contents -->
                        <div class="emoji-content active" id="smileys">
                            <span class="emoji">😀</span>
                            <span class="emoji">😁</span>
                            <span class="emoji">😂</span>
                            <span class="emoji">🤣</span>
                            <span class="emoji">😊</span>
                            <span class="emoji">😭</span>
                            <!-- Thêm emoji mới giống Messenger/Zalo -->
                            <span class="emoji">😍</span>
                            <span class="emoji">😘</span>
                            <span class="emoji">😜</span>
                            <span class="emoji">😎</span>
                            <span class="emoji">😏</span>
                            <span class="emoji">🤔</span>
                            <span class="emoji">🥰</span>
                            <span class="emoji">🥲</span>
                        </div>

                        <div class="emoji-content" id="hearts">
                            <span class="emoji">❤️</span>
                            <span class="emoji">💙</span>
                            <span class="emoji">💚</span>
                            <span class="emoji">💛</span>
                            <span class="emoji">💜</span>
                            <!-- Thêm emoji mới -->
                            <span class="emoji">🖤</span>
                            <span class="emoji">🤍</span>
                            <span class="emoji">🤎</span>
                            <span class="emoji">💔</span>
                            <span class="emoji">💖</span>
                            <span class="emoji">💗</span>
                            <span class="emoji">💓</span>
                            <span class="emoji">💕</span>
                        </div>

                        <div class="emoji-content" id="symbols">
                            <span class="emoji">🔥</span>
                            <span class="emoji">🎉</span>
                            <span class="emoji">👍</span>
                            <span class="emoji">👎</span>
                            <span class="emoji">🙏</span>
                            <!-- Thêm emoji mới -->
                            <span class="emoji">✌️</span>
                            <span class="emoji">💪</span>
                            <span class="emoji">🤝</span>
                            <span class="emoji">✨</span>
                            <span class="emoji">🌟</span>
                            <span class="emoji">🎶</span>
                            <span class="emoji">🎁</span>
                            <span class="emoji">💥</span>
                        </div>

                    </div>

                </div>

            </form>
        </div>
    </div>
</div>

<!-- Edit Message Modal -->
<div class="modal fade" id="editMessageModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Sửa tin nhắn</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea class="form-control" id="editMessageText" rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary" onclick="saveEditedMessage()">Lưu</button>
            </div>
        </div>
    </div>
</div>
<!-- Modal xem ảnh fullscreen (thêm vào cuối body, trước các script) -->
<div id="imageViewModal" class="image-view-modal">
    <span class="image-view-close" onclick="chatApp.closeImageView()">&times;</span>
    <img class="image-view-content" id="imageViewContent">
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.2/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="/js/chat.js"></script>

</body>
</html>
