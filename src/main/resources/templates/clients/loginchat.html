<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Chat System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <!-- CSS & JS của chatbox -->
    <link rel="stylesheet" th:href="@{/css/chatboxai.css}">
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <i class="fas fa-comment-dots logo-icon"></i>
        <h2 class="mb-0">Chào mừng bạn trở lại</h2>
        <p class="mb-0">Đăng nhập để bắt đầu trò chuyện</p>
    </div>
    <div class="login-body">
        <form id="loginForm">
            <div class="mb-4">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu của bạn" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility()">
                        <i class="fas fa-eye" id="togglePasswordIcon"></i>
                    </span>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Đăng nhập</button>
            </div>
            <!-- Divider -->
            <div class="text-center my-3">
                <span class="text-muted">hoặc</span>
            </div>
            <!-- Google Login Button -->
            <!-- Google Login Button -->
            <div class="mb-4">
                <a href="/oauth2/authorization/google" class="btn google-btn w-100" id="googleLoginBtn">
                    <i class="fab fa-google"></i>
                    Đăng nhập bằng Google
                </a>
            </div>
            <div class="mt-4 text-center">
                <small class="text-muted">
                    Chưa có tài khoản?
                    <a href="#" class="text-decoration-none">Đăng ký ngay</a>
                </small>
            </div>
        </form>
        <div id="errorMessage" class="alert alert-danger mt-4" style="display: none;"></div>
    </div>
</div>

<!-- Include chatbox -->
<div th:replace="chat/chatbox :: chatbox"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>


<script th:src="@{/js/chatbox.js}"></script>
</body>
</html>
